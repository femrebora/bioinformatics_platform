version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bioplatform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bioplatform}
      POSTGRES_DB: ${POSTGRES_DB:-bioplatform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bioplatform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bioplatform}:${POSTGRES_PASSWORD:-bioplatform}@postgres:5432/${POSTGRES_DB:-bioplatform}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      EC2_BACKEND: ${EC2_BACKEND:-mock}
      HLA_BACKEND: ${HLA_BACKEND:-mock}
      UPLOADS_DIR: /uploads
    volumes:
      - uploads_data:/uploads
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-bioplatform}:${POSTGRES_PASSWORD:-bioplatform}@postgres:5432/${POSTGRES_DB:-bioplatform}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      EC2_BACKEND: ${EC2_BACKEND:-mock}
      HLA_BACKEND: ${HLA_BACKEND:-mock}
      UPLOADS_DIR: /uploads
    volumes:
      - uploads_data:/uploads
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:
  uploads_data:
