version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bioplatform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bioplatform}
      POSTGRES_DB: ${POSTGRES_DB:-bioplatform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bioplatform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bioplatform}:${POSTGRES_PASSWORD:-bioplatform}@postgres:5432/${POSTGRES_DB:-bioplatform}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      EC2_BACKEND: ${EC2_BACKEND:-mock}
      HLA_BACKEND: ${HLA_BACKEND:-mock}
      NEXTFLOW_BACKEND: ${NEXTFLOW_BACKEND:-local}
      NEXTFLOW_PROFILE: ${NEXTFLOW_PROFILE:-docker}
      SNAKEMAKE_BACKEND: ${SNAKEMAKE_BACKEND:-mock}
      BIOSCRIPT_BACKEND: ${BIOSCRIPT_BACKEND:-mock}
      CUSTOM_BACKEND: ${CUSTOM_BACKEND:-mock}
      UPLOADS_DIR: /uploads
      JWT_SECRET: ${JWT_SECRET:-changeme-replace-in-production-with-a-random-secret}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
      SNAKEMAKE_BATCH_QUEUE: ${SNAKEMAKE_BATCH_QUEUE:-}
      SNAKEMAKE_CONTAINER_IMAGE: ${SNAKEMAKE_CONTAINER_IMAGE:-snakemake/snakemake:v8.20.0}
      BIOSCRIPT_DOCKER_IMAGE: ${BIOSCRIPT_DOCKER_IMAGE:-bioplatform/tools:latest}
    volumes:
      - uploads_data:/uploads
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-bioplatform}:${POSTGRES_PASSWORD:-bioplatform}@postgres:5432/${POSTGRES_DB:-bioplatform}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      EC2_BACKEND: ${EC2_BACKEND:-mock}
      HLA_BACKEND: ${HLA_BACKEND:-mock}
      NEXTFLOW_BACKEND: ${NEXTFLOW_BACKEND:-local}
      NEXTFLOW_PROFILE: ${NEXTFLOW_PROFILE:-docker}
      SNAKEMAKE_BACKEND: ${SNAKEMAKE_BACKEND:-mock}
      BIOSCRIPT_BACKEND: ${BIOSCRIPT_BACKEND:-mock}
      CUSTOM_BACKEND: ${CUSTOM_BACKEND:-mock}
      UPLOADS_DIR: /uploads
      JWT_SECRET: ${JWT_SECRET:-changeme-replace-in-production-with-a-random-secret}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      BATCH_JOB_QUEUE: ${BATCH_JOB_QUEUE:-bioplatform-default}
      BATCH_JOB_ROLE_ARN: ${BATCH_JOB_ROLE_ARN:-}
      SNAKEMAKE_BATCH_QUEUE: ${SNAKEMAKE_BATCH_QUEUE:-}
      SNAKEMAKE_CONTAINER_IMAGE: ${SNAKEMAKE_CONTAINER_IMAGE:-snakemake/snakemake:v8.20.0}
      BIOSCRIPT_DOCKER_IMAGE: ${BIOSCRIPT_DOCKER_IMAGE:-bioplatform/tools:latest}
    volumes:
      - uploads_data:/uploads
      - outputs_data:/outputs
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:
  uploads_data:
  outputs_data:
